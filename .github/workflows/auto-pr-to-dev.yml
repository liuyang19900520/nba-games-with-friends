name: Auto PR to Dev

on:
  push:
    branches-ignore:
      - main
      - dev

permissions:
  pull-requests: write
  contents: read

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Pull Request to Dev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch_name=${GITHUB_REF#refs/heads/}
          
          # Check if PR already exists
          existing_pr=$(gh pr list --head "$branch_name" --base dev --json number --jq '.[0].number')
          
          if [ -z "$existing_pr" ]; then
            echo "Creating new PR for $branch_name -> dev"
            gh pr create \
              --base dev \
              --head "$branch_name" \
              --title "Auto PR: Merge $branch_name into dev" \
              --body "This PR was automatically created by GitHub Actions because changes were pushed to branch \`$branch_name\`."
          else
            echo "PR already exists (#$existing_pr), skipping creation."
          fi
